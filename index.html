<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberty Formula | Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <button class="menu-burger-btn" onclick="togglePitwallControl()">≡ PITWALL</button>
        <div class="live-badge"><span class="dot"></span> LIVE</div>
        <div class="main-logo">LIBERTY<span>FORMULA</span></div>
        <div class="active-gp-badge" id="current-gp-display">ОЖИДАНИЕ ДАННЫХ...</div>
        
        <div class="mode-selectors">
            <button id="btn-spectator" class="mode-btn active" onclick="setMode('spectator')">SPECTATOR</button>
            <button id="btn-pro" class="mode-btn" onclick="setMode('pro')">PRO PITWALL</button>
        </div>
    </header>

    <aside id="pitwall-sidebar" class="pitwall-sidebar">
        <div class="sidebar-header">
            <h3>RACE CONTROL</h3>
            <button class="close-btn" onclick="togglePitwallControl()">×</button>
        </div>

        <div class="sidebar-section">
            <h4>КОММЕНТАТОРСКАЯ</h4>
            <div class="radio-group">
                <label><input type="radio" name="audio-feed" value="ru_main" checked> RU (Основная)</label>
                <label><input type="radio" name="audio-feed" value="ru_alt"> RU (Альтернативная)</label>
                <label><input type="radio" name="audio-feed" value="en_sky"> EN (Sky Sports)</label>
            </div>
            <h4 style="margin-top: 15px;">ЗАДЕРЖКА АУДИО (СЕК)</h4>
            <input type="range" id="delay-input-range" min="-10" max="10" step="0.5" value="0" style="width: 100%;">
            
            <h4 style="margin-top: 15px;">ОПЕРАТИВНАЯ ПЛАШКА</h4>
            <input type="text" id="commentator-notice-text" placeholder="Текст сообщения...">
            <select id="commentator-notice-type">
                <option value="white">Обычная (Белая)</option>
                <option value="yellow">Желтые флаги (Желтая)</option>
                <option value="green">Зеленый флаг (Зеленая)</option>
                <option value="red">Красный флаг (Красная)</option>
            </select>
            <button class="action-btn-blue" onclick="commentatorPushChanges()">ОТПРАВИТЬ В ЭФИР</button>
        </div>

        <hr style="border-color: var(--border-color); margin: 20px 0;">

        <div class="sidebar-section">
            <h4>ДОСТУП АДМИНИСТРАТОРА</h4>
            <div id="admin-auth-fields">
                <input type="text" id="admin-login-input" placeholder="Логин (Kimi)">
                <input type="password" id="admin-pass-input" placeholder="Пароль">
                <button class="action-btn-red" onclick="unlockAdminZone()">АВТОРИЗАЦИЯ</button>
            </div>

            <div id="admin-core-controls" style="display: none;">
                <button class="action-btn-green" onclick="adminPushConfig()">СМЕНИТЬ ГРАН-ПРИ</button>
                <button class="action-btn-sub" onclick="refreshAdminLogs()">ОБНОВИТЬ ЛОГИ ЯДРА</button>
                <div id="admin-logs-view">Ожидание логов сервера...</div>
            </div>
        </div>
    </aside>

    <main id="workspace-container" class="workspace">
        
        <div class="race-notices-bar" id="notices-marquee-container">
            </div>

        <section class="video-section">
            <div class="stream-info-overlay">ИСТОЧНИК: <span id="provider-name" class="lbl">ОЖИДАНИЕ</span></div>
            <video id="f1-player" controls autoplay muted style="background: #000;"></video>
        </section>

        <section class="podium-row pro-only" id="live-podium-container">
            </section>

        <section class="highlights-section spectator-only">
            <h3>АРХИВ ТРАНСЛЯЦИЙ И ХАЙЛАЙТЫ</h3>
            <div class="hl-grid" id="highlights-container">
                </div>
        </section>

        <section class="news-section">
            <h3>ЛЕНТА НОВОСТЕЙ F1</h3>
            <div class="news-list" id="news-container">
                </div>
        </section>

    </main>

    <script src="main.js"></script>
</body>
</html>
