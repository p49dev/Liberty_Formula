<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberty Formula</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>

    <!-- ADMIN LOGIN -->
    <div class="modal" id="adminModal">
        <div class="modal-box">
            <h3>Admin Access</h3>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <div class="error" id="adminError"></div>
            <button onclick="checkAdmin()">Login</button>
        </div>
    </div>

    <!-- BROADCAST -->
    <div class="modal" id="broadcastModal">
        <div class="modal-box">
            <h3>Broadcast</h3>
            <textarea id="broadcastMsg" rows="3" placeholder="Message..."></textarea>
            <button onclick="sendBroadcast()">Send</button>
            <button onclick="closeModal('broadcastModal')" style="background:transparent;color:var(--text-2)">Cancel</button>
        </div>
    </div>

    <!-- ADMIN BAR -->
    <div class="admin-bar" id="adminBar">
        <span>🔒 ADMIN</span>
        <button onclick="restartStream()">Restart</button>
        <button onclick="clearCache()">Clear</button>
        <button onclick="openModal('broadcastModal')">Broadcast</button>
        <button onclick="adminLogout()" class="danger">Logout</button>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <div class="logo-icon">LF</div>
            <div>LIBERTY<span style="color:var(--red)">FORMULA</span></div>
        </div>
        <div class="live"><div class="dot"></div>LIVE</div>
        <div class="session">
            <img src="https://flagcdn.com/w80/gb.png" id="flag">
            <div>
                <div id="gpName">British GP — Race</div>
                <div id="gpTrack" style="font-size:11px;color:var(--text-2);text-transform:uppercase">Silverstone</div>
            </div>
        </div>
        <div style="margin-left:auto;display:flex;gap:4px">
            <button class="mode" onclick="setMode('spectator')">Spectator</button>
            <button class="mode active" onclick="setMode('pitwall')">Pitwall</button>
            <button class="mode" onclick="openModal('adminModal')">Admin</button>
        </div>
    </header>

    <!-- ENGINE BAR -->
    <div class="engine">
        <span id="clock">[00:00:00]</span>
        <span>REDRACE ENGINE ONLINE</span>
        <span id="modeLabel">PITWALL</span>
    </div>

    <!-- MOBILE NAV -->
    <div class="mob-nav" id="mobNav">
        <button onclick="mobTab('video')" class="active">📺</button>
        <button onclick="mobTab('standings')">🏁</button>
        <button onclick="mobTab('data')">📊</button>
        <button onclick="mobTab('news')">📰</button>
    </div>

    <!-- MAIN -->
    <div class="main">
        <!-- VIDEO -->
        <div class="video-col" id="videoCol">
            <div class="video-box">
                <div class="v-badge" id="vBadge">WAITING</div>
                <div class="v-placeholder" id="vPlaceholder">
                    <div style="font-size:48px">📡</div>
                    <div>Select stream source</div>
                </div>
                <video id="video" style="display:none" controls></video>
                <iframe id="iframe" style="display:none" allowfullscreen></iframe>
            </div>
            <div class="controls">
                <select id="srcSelect" onchange="loadStream(this.value)">
                    <option value="">Source...</option>
                    <optgroup label="🆓 Free">
                        <option value="rtbf">RTBF (Belgium)</option>
                        <option value="servus">ServusTV (Austria)</option>
                        <option value="orf">ORF (Austria)</option>
                        <option value="youtube">YouTube</option>
                    </optgroup>
                    <optgroup label="🔐 Paid">
                        <option value="f1tv">F1 TV Pro</option>
                        <option value="sky">Sky Sports</option>
                    </optgroup>
                    <option value="custom">🔗 Custom HLS</option>
                </select>
                <select id="audioSelect">
                    <option value="ru">🇷🇺 RU Main</option>
                    <option value="ru2">🇷🇺 RU Alt</option>
                    <option value="en">🇬🇧 EN Sky</option>
                    <option value="fx">🔊 FX</option>
                </select>
                <div class="delay-box" id="delayBox">
                    <span>Delay</span>
                    <input type="range" id="delay" min="0" max="30" step="0.5" value="0" oninput="document.getElementById('dVal').innerText=this.value+'s'">
                    <span id="dVal" style="color:var(--red);font-weight:700;min-width:40px">0s</span>
                </div>
                <button onclick="sync()" id="syncBtn">🔄 Sync</button>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="side-col" id="sideCol">
            <div class="panel">
                <div class="p-head">
                    <div class="p-title">Standings</div>
                    <span style="color:var(--text-3);font-size:12px" id="lapInfo">Lap 1/52</span>
                </div>
                <div id="standings"></div>
            </div>

            <div class="panel" id="telePanel">
                <div class="p-head">
                    <div class="p-title">Telemetry</div>
                    <span style="color:var(--green);font-size:11px;font-weight:700">LIVE</span>
                </div>
                <div class="tele-grid">
                    <div class="tele-item">
                        <div class="t-label">Track</div>
                        <div><span class="t-val" id="t1">--</span><span class="t-unit">°C</span></div>
                        <div class="t-bar"><div id="b1"></div></div>
                    </div>
                    <div class="tele-item">
                        <div class="t-label">Air</div>
                        <div><span class="t-val" id="t2">--</span><span class="t-unit">°C</span></div>
                        <div class="t-bar"><div id="b2"></div></div>
                    </div>
                    <div class="tele-item">
                        <div class="t-label">Humidity</div>
                        <div><span class="t-val" id="t3">--</span><span class="t-unit">%</span></div>
                        <div class="t-bar"><div id="b3"></div></div>
                    </div>
                    <div class="tele-item">
                        <div class="t-label">Wind</div>
                        <div><span class="t-val" id="t4">--</span><span class="t-unit">km/h</span></div>
                        <div class="t-bar"><div id="b4"></div></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="p-head"><div class="p-title">Race Control</div></div>
                <div class="news" id="news"></div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-box" id="toastBox"></div>

<script>
const API = 'https://libertyformula-production-4740.up.railway.app';
const SRC = {
    rtbf:{name:'RTBF',type:'sl',url:'https://auvio.rtbf.be',free:true},
    servus:{name:'ServusTV',type:'sl',url:'https://www.servustv.com',free:true},
    orf:{name:'ORF',type:'sl',url:'https://tvthek.orf.at',free:true},
    youtube:{name:'YouTube',type:'ifr',url:'https://www.youtube.com/embed/live_stream?channel=UCB_qr75-ydFVKSF9Dmo6izg',free:true},
    f1tv:{name:'F1 TV',type:'sl',url:'https://f1tv.formula1.com',free:false},
    sky:{name:'Sky',type:'sl',url:'https://www.skysports.com/watch/sky-sports-f1',free:false},
    custom:{name:'Custom',type:'hls',url:'',free:true}
};
let mode='pitwall', admin=false, currentSrc=null;

// CLOCK
setInterval(()=>{
    const t=new Date().toTimeString().split(' ')[0];
    document.getElementById('clock').innerText='['+t+']';
},1000);

// MODAL
function openModal(id){document.getElementById(id).style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
document.querySelectorAll('.modal').forEach(m=>{
    m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)});
});

// ADMIN
function checkAdmin(){
    const u=document.getElementById('adminUser').value;
    const p=document.getElementById('adminPass').value;
    if(u==='Kimi'&&p==='BWOAH2026'){
        admin=true;closeModal('adminModal');
        setMode('admin');
        toast('Admin OK','ok');
    }else{
        document.getElementById('adminError').innerText='Wrong creds';
    }
}
function adminLogout(){admin=false;setMode('pitwall');document.getElementById('adminBar').style.display='none'}
function restartStream(){if(currentSrc){loadStream(currentSrc);toast('Restarted','ok')}}
function clearCache(){loadMock();toast('Cleared','ok')}
function sendBroadcast(){
    const msg=document.getElementById('broadcastMsg').value;
    if(!msg)return;
    const t=new Date().toTimeString().substr(0,5);
    addNews(t,'[ADMIN] '+msg,'var(--red)');
    document.getElementById('broadcastMsg').value='';
    closeModal('broadcastModal');
    toast('Sent','ok');
}

// MODE
function setMode(m){
    mode=m;
    document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.innerText.toLowerCase().includes(m)));
    document.body.setAttribute('data-mode',m);
    document.getElementById('modeLabel').innerText=m.toUpperCase();
    document.getElementById('adminBar').style.display=(m==='admin')?'flex':'none';
    const hide=m==='spectator';
    document.getElementById('delayBox').style.display=hide?'none':'flex';
    document.getElementById('syncBtn').style.display=hide?'none':'inline-flex';
    document.getElementById('telePanel').style.display=hide?'none':'block';
}

// STREAM
function loadStream(key){
    if(!key){showPlaceholder();return}
    const s=SRC[key];currentSrc=key;
    document.getElementById('vBadge').innerText=s.name.toUpperCase();
    document.getElementById('vPlaceholder').style.display='none';
    document.getElementById('video').style.display='none';
    document.getElementById('iframe').style.display='none';
    if(s.type==='ifr'){
        document.getElementById('iframe').style.display='block';
        document.getElementById('iframe').src=s.url;
    }else if(s.type==='hls'){
        const url=prompt('HLS URL:');if(!url){showPlaceholder();return}
        document.getElementById('video').style.display='block';
        document.getElementById('video').src=url;
        document.getElementById('video').play();
    }else{
        // Streamlink - show instructions
        document.getElementById('vPlaceholder').style.display='flex';
        document.getElementById('vPlaceholder').innerHTML=`<div style="font-size:32px">⚙️</div><div>Run locally:</div><code style="background:#1a1a24;padding:4px 8px;border-radius:4px;color:var(--red);font-size:11px">streamlink "${s.url}" best --player-external-http</code><br><button onclick="promptProxy()" style="margin-top:8px;padding:6px 14px;background:var(--red);border:none;border-radius:6px;color:#fff;cursor:pointer">Enter proxy URL</button>`;
    }
}
function promptProxy(){
    const url=prompt('Proxy URL (http://localhost:PORT):');
    if(url){
        document.getElementById('vPlaceholder').style.display='none';
        document.getElementById('video').style.display='block';
        document.getElementById('video').src=url;
        document.getElementById('video').play();
    }
}
function showPlaceholder(){
    document.getElementById('vPlaceholder').style.display='flex';
    document.getElementById('vPlaceholder').innerHTML='<div style="font-size:48px">📡</div><div>Select stream source</div>';
    document.getElementById('video').style.display='none';
    document.getElementById('iframe').style.display='none';
    document.getElementById('vBadge').innerText='WAITING';
    currentSrc=null;
}
function sync(){
    const v=document.getElementById('video');
    const d=parseFloat(document.getElementById('delay').value);
    if(v&&v.currentTime){v.currentTime-=d;toast('Synced -'+d+'s','ok')}
}

// MOBILE
function mobTab(tab){
    document.querySelectorAll('.mob-nav button').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes(tab)));
    const v=document.getElementById('videoCol');
    const s=document.getElementById('sideCol');
    if(tab==='video'){v.style.display='flex';s.style.display='none'}
    else{v.style.display='none';s.style.display='flex';s.style.flexDirection='column'}
}

// DATA
function loadMock(){
    const drivers=[
        {p:1,name:'Lando Norris',team:'McLaren',num:4,gap:'LEADER'},
        {p:2,name:'Lewis Hamilton',team:'Ferrari',num:44,gap:'+2.341'},
        {p:3,name:'Kimi Antonelli',team:'Mercedes',num:12,gap:'+5.892'},
        {p:4,name:'Max Verstappen',team:'Red Bull',num:1,gap:'+8.156'},
        {p:5,name:'Fernando Alonso',team:'Aston Martin',num:14,gap:'+12.403'},
        {p:6,name:'George Russell',team:'Mercedes',num:63,gap:'+15.221'},
        {p:7,name:'Charles Leclerc',team:'Ferrari',num:16,gap:'+18.994'},
        {p:8,name:'Oscar Piastri',team:'McLaren',num:81,gap:'+22.117'},
        {p:9,name:'Carlos Sainz',team:'Williams',num:55,gap:'+25.883'},
        {p:10,name:'Liam Lawson',team:'Racing Bulls',num:30,gap:'+31.442'}
    ];
    const colors=['#FF8000','#E80020','#27F4D2','#3671C6','#229971','#27F4D2','#E80020','#FF8000','#64C4FF','#6692FF'];
    document.getElementById('standings').innerHTML=drivers.map(d=>`
        <div class="driver" style="border-left-color:${colors[d.p-1]}">
            <div class="pos">P${d.p}</div>
            <div class="info"><div>${d.name}</div><div class="team">${d.team}</div></div>
            <div style="text-align:right"><div class="num">${d.num}</div><div class="gap">${d.gap}</div></div>
        </div>
    `).join('');

    document.getElementById('t1').innerText='42';document.getElementById('b1').style.width='70%';
    document.getElementById('t2').innerText='28';document.getElementById('b2').style.width='55%';
    document.getElementById('t3').innerText='65';document.getElementById('b3').style.width='65%';
    document.getElementById('t4').innerText='12';document.getElementById('b4').style.width='40%';

    const news=document.getElementById('news');
    news.innerHTML=`<div class="n-item"><span class="n-time">12:00</span><span><strong>RACE START</strong> — Formation lap</span></div>
    <div class="n-item"><span class="n-time">11:58</span><span>All on <strong>SOFT</strong></span></div>
    <div class="n-item"><span class="n-time">11:55</span><span>Track <strong>DRY</strong></span></div>`;
}
function addNews(time,msg,color){
    const n=document.getElementById('news');
    const d=document.createElement('div');d.className='n-item';
    d.innerHTML=`<span class="n-time">${time}</span><span style="color:${color||'var(--text-2)'}">${msg}</span>`;
    n.insertBefore(d,n.firstChild);
}

// TOAST
function toast(msg,type){
    const box=document.getElementById('toastBox');
    const t=document.createElement('div');t.className='toast';
    if(type==='ok')t.style.borderColor='rgba(0,255,136,0.3)';t.style.color='var(--green)';
    t.innerText=msg;box.appendChild(t);
    setTimeout(()=>t.remove(),3000);
}

// API
async function fetchData(){
    try{
        const r=await fetch(API+'/api/f1/weather?session_key=latest');
        if(!r.ok)return;
        const d=await r.json();
        if(d.length){const l=d[d.length-1];updateTele(l)}
    }catch(e){}
}
function updateTele(d){
    if(d.track_temperature!==undefined){document.getElementById('t1').innerText=Math.round(d.track_temperature);document.getElementById('b1').style.width=Math.min(d.track_temperature,100)+'%'}
    if(d.air_temperature!==undefined){document.getElementById('t2').innerText=Math.round(d.air_temperature);document.getElementById('b2').style.width=Math.min(d.air_temperature*2,100)+'%'}
    if(d.humidity!==undefined){document.getElementById('t3').innerText=Math.round(d.humidity);document.getElementById('b3').style.width=d.humidity+'%'}
    if(d.wind_speed!==undefined){document.getElementById('t4').innerText=Math.round(d.wind_speed);document.getElementById('b4').style.width=Math.min(d.wind_speed*2,100)+'%'}
}

// INIT
loadMock();
setInterval(fetchData,5000);
fetchData();
</script>
</body>
</html>
